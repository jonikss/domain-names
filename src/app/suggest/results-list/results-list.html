<section class="space-y-4">
  @for (group of groups(); track group.zone) {
    <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
      <header class="mb-3 flex items-center justify-between">
        <h2 class="text-lg font-semibold">.{{ group.zone }}</h2>
        <span class="text-xs text-slate-500">{{ group.list.length }} свободно</span>
      </header>
      <ul class="divide-y divide-slate-100">
        @for (item of group.list; track item.fqdn) {
          <li class="flex items-start justify-between gap-4 py-2">
            <div>
              <div class="font-mono text-sm font-medium text-slate-900">
                {{ item.fqdn }}
              </div>
              @if (item.rationale) {
                <div class="mt-0.5 text-xs text-slate-500">{{ item.rationale }}</div>
              }
            </div>
          </li>
        }
      </ul>
    </article>
  }
</section>
