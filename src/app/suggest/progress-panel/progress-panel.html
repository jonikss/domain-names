<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="flex items-center justify-between text-sm">
    <span class="font-medium text-slate-700">
      @switch (phase()) {
        @case ('generating') { Генерирую кандидатов… }
        @case ('checking') { Проверяю доступность доменов }
        @case ('done') { Готово }
      }
    </span>
    @if (totalCount() > 0) {
      <span class="font-mono text-xs text-slate-500">
        {{ checkedCount() }} / {{ totalCount() }}
      </span>
    }
  </div>
  <div class="mt-3 h-2 w-full overflow-hidden rounded-full bg-slate-100">
    <div
      class="h-full rounded-full bg-indigo-500 transition-[width] duration-200 ease-out"
      [style.width.%]="phase() === 'generating' ? 5 : progressPercent()"
    ></div>
  </div>
  @if (freeCount() > 0) {
    <div class="mt-3 text-xs text-slate-500">
      Свободных найдено: <strong class="text-slate-900">{{ freeCount() }}</strong>
    </div>
  }
</section>
