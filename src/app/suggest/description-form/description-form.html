<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <label for="description" class="block text-sm font-medium text-slate-700">
    Описание проекта
  </label>
  <textarea
    id="description"
    rows="4"
    class="mt-2 w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
    placeholder="Например: сервис для совместной работы над задачами с ИИ-подсказками"
    [ngModel]="description()"
    (ngModelChange)="description.set($event)"
    [disabled]="loading()"
  ></textarea>

  <fieldset class="mt-4">
    <legend class="text-sm font-medium text-slate-700">Зоны</legend>
    <div class="mt-2 flex flex-wrap gap-2">
      @for (zone of zones; track zone) {
        <label
          class="inline-flex cursor-pointer items-center gap-2 rounded-full border border-slate-300 bg-white px-3 py-1.5 text-sm hover:border-indigo-400"
          [class.border-indigo-500]="isZoneSelected(zone)"
          [class.bg-indigo-50]="isZoneSelected(zone)"
          [class.text-indigo-700]="isZoneSelected(zone)"
        >
          <input
            type="checkbox"
            class="h-4 w-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500"
            [checked]="isZoneSelected(zone)"
            (change)="toggleZone(zone, $any($event.target).checked)"
            [disabled]="loading()"
          />
          <span>.{{ zone }}</span>
        </label>
      }
    </div>
  </fieldset>

  <div class="mt-5 flex items-center gap-3">
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-50"
      [disabled]="!canSubmit()"
      (click)="submit()"
    >
      @if (loading()) {
        <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
        <span>Подбираю…</span>
      } @else {
        <span>Предложить имена</span>
      }
    </button>
  </div>
</section>
